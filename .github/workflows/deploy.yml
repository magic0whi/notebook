name: Build and Deploy
on: [push]
env:
  ARTIFACT_NAME: notebook-build.zip
  DEPLOY_HOST: notebook.proteus.eu.org
  DEPLOY_USER: caddy
  DEPLOY_ROOT: ./notebook
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Set up Git repository
      uses: actions/checkout@v6.0.2

    - name: Cache
      uses: actions/cache@v5.0.2
      with:
        path: node_modules
        key: ${{ runner.os }}-node-${{ hashFiles('**/pnpm-lock.yaml')}}

    - name: Install Lix
      if: github.server_url == 'https://github.com'
      uses: samueldr/lix-gha-installer-action@f5e94192f565f53d84f41a056956dc0d3183b343

    - name: Install Lix (Single User)
      if: github.server_url != 'https://github.com'
      uses: canidae-solutions/lix-quick-install-action@v4.0.1
      with:
        github_access_token: ${{ secrets.ACCESS_TOKEN_GITHUB }}
        lix_conf: |
          extra-substituters = https://nix-cache.s3-pub.proteus.eu.org/
          extra-trusted-public-keys = s3.proteus.eu.org-1:IxrRwk4uC5ittHeG9menkuajABnrX9cboEWwZz/m4+E=

    - name: Install and build (Github)
      if: github.server_url == 'https://github.com'
      run: nix develop github:magic0whi/dev_flake#node --command sh -c \
        'pnpm install && pnpm build'

    - name: Install and build (Forgejo)
      if: github.server_url != 'https://github.com'
      run: nix develop git+https://git.proteus.eu.org/proteus/dev_flake#node --command sh -c \
        'pnpm install && pnpm build'

    - name: Upload artifact (Github)
      if: github.server_url == 'https://github.com'
      uses: actions/upload-pages-artifact@v4.0.0
      with:
        path: ./_book

    - name: Upload artifact (Forgejo)
      if: github.server_url != 'https://github.com'
      uses: ChristopherHX/gitea-upload-artifact@v4
      with:
        name: ${{ env.ARTIFACT_NAME }}
        path: ./_book

  deploy-github:
    runs-on: ubuntu-latest
    needs: build
    if: github.server_url == 'https://github.com'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to Github Pages
        id: deployment
        uses: actions/deploy-pages@v4.0.5

  deploy-forgejo:
    runs-on: ubuntu-latest
    needs: build
    if: github.server_url != 'https://github.com'
    steps:
      - name: Download artifact
        # https://github.com/actions/download-artifact/tree/484a0b528fb4d7bd804637ccb632e47a0e638317?tab=readme-ov-file#ghes-support
        uses: ChristopherHX/gitea-download-artifact@v8
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ./_book

      - name: Extract manually
        run: |
          cd ./_book
          unzip -q ${{ env.ARTIFACT_NAME }}

      # # Debug
      # - name: Setup tmate session
      #   uses: mxschmitt/action-tmate@v3.23
      # You can also try https://upterm.dev/

      # Deploy the built site to homelab's Caddy directory over rsync
      - name: Deploy to homelab's Caddy Root
        uses: burnett01/rsync-deployments@v8
        with:
          # debug: true
          switches: -avzr --delete
          path: _book/
          remote_host: ${{ env.DEPLOY_HOST }}
          remote_user: ${{ env.DEPLOY_USER }}
          remote_path: ${{ env.DEPLOY_ROOT }}
          remote_key: ${{ secrets.DEPLOY_SSH_KEY }}
          remote_key_pass: ${{ secrets.DEPLOY_SSH_KEY_PASS }}
